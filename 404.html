<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Page not found · Raise to Rise Foundation</title>
<style>
  :root{--navy:#152A4E;--coral:#F25C6E;--paper:#FBF8F3;--muted:#6b7587;--serif:Georgia,'Times New Roman',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:#2a3445;font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--serif);font-size:clamp(80px,18vw,160px);color:var(--navy);font-weight:700;line-height:1;opacity:.12;position:absolute;user-select:none}
  .card{position:relative;max-width:480px}
  h1{font-family:var(--serif);font-size:clamp(26px,5vw,36px);color:var(--navy);margin-bottom:14px}
  p{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:32px}
  .btn{display:inline-block;background:var(--coral);color:#fff;padding:13px 28px;border-radius:40px;font-weight:600;font-size:15px;text-decoration:none;transition:background .15s}
  .btn:hover{background:#d83f53}
  .sub{margin-top:20px;font-size:13px;color:var(--muted)}
  .sub a{color:var(--coral);text-decoration:none}
</style>
</head>
<body>
<div class="num" aria-hidden="true">404</div>
<div class="card">
  <h1>This page doesn't exist.</h1>
  <p>You might have followed a broken link, or typed something wrong. Either way, let's get you back.</p>
  <a class="btn" href="/">Back to Raise to Rise</a>
  <p class="sub">Need help? <a href="mailto:raisetorisecom@gmail.com">raisetorisecom@gmail.com</a></p>
</div>
</body>
</html>
